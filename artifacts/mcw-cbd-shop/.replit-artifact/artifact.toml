kind = "web"
previewPath = "/"
title = "MCW — CBD Relax Shop"
version = "1.0.0"
id = "artifacts/mcw-cbd-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18272
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mcw-cbd-shop run dev"

[services.env]
PORT = "18272"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mcw-cbd-shop", "run", "build"]
publicDir = "artifacts/mcw-cbd-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

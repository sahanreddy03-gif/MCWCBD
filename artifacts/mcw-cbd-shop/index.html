<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>MCW — CBD Relax Shop Malta</title>

    <!-- Canonical -->
    <link rel="canonical" href="https://mcwcbd.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
    <meta name="theme-color" content="#22c55e" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Primary Meta -->
    <meta name="description" content="MCW — Malta's #1 Hemp & CBD Destination. Shop CBD oils, flowers, vapes, gummies and more. 4 locations: Sliema, Gzira, Mellieha, Bugibba. Same-day delivery available." />
    <meta name="keywords" content="CBD Malta, hemp Malta, CBD shop Malta, buy CBD Malta, CBD Sliema, hemp shop Malta, CBD flowers Malta, CBD oil Malta" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="MCW CBD Relax Shop" />

    <!-- Open Graph -->
    <meta property="og:title" content="MCW — Malta's #1 CBD & Hemp Shop" />
    <meta property="og:description" content="Premium CBD and hemp lifestyle products. 4 stores across Malta. Same-day delivery." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mcwcbd.com/" />
    <meta property="og:image" content="https://mcwcbd.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="MCW CBD Relax Shop" />
    <meta property="og:locale" content="en_MT" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MCW — Malta's #1 CBD & Hemp Shop" />
    <meta name="twitter:description" content="Premium CBD and hemp products. 4 stores across Malta. Same-day delivery." />
    <meta name="twitter:image" content="https://mcwcbd.com/opengraph.jpg" />

    <!-- WebSite JSON-LD (LocalBusiness is injected by React Layout) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://mcwcbd.com/#website",
      "name": "MCW CBD Relax Shop",
      "url": "https://mcwcbd.com",
      "description": "Malta's #1 Hemp & CBD destination. 4 stores across Malta — Sliema, Gzira, Mellieha, Bugibba.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mcwcbd.com/shop?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
